name: Deploy to GitHub Pages

on:
  # 触发条件：主分支有push操作时
  push:
    branches:
      - master  # 如果你的主分支名是master，改为master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest  # 使用Ubuntu环境

    steps:
      # 1. 拉取代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 设置Node环境
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'  # 使用Node 18或更高版本

      # 3. 安装依赖
      - name: Install dependencies
        run: npm install

      # 4. 构建项目
      - name: Build Vue project
        run: npm run build  # 执行项目的构建命令

      # 5. 部署到GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}  # GitHub自动生成的token
          publish_dir: ./dist  # Vue打包后的输出目录
          user_name: 'dhyuann'  # 部署者名称
          user_email: 'dhyuann@dhyuann.github.com'  # 部署者邮箱
    
